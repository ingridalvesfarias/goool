<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>GOOOOL</title>
    <style>
        :root {
            --green: #2d5a27;
            --neon-green: #39ff14;
            --neon-purple: #bc13fe;
        }

        body {
            margin: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            color: white;
        }

        .estadio {
            width: 800px;
            height: 400px;
            background: var(--green);
            position: relative;
            border: 10px solid #333;
            overflow: hidden;
            background-image: linear-gradient(90deg, rgba(255, 255, 255, 0.05) 50%, transparent 50%);
            background-size: 100px 100%;
        }

        #gol-efecto {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #gol-efecto h1 {
            font-size: 100px;
            color: var(--neon-green);
            text-shadow: 0 0 50px var(--neon-green);
            animation: pulsar 1s infinite;
        }

        @keyframes pulsar {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        #placar {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 24px;
            color: var(--neon-green);
            text-shadow: 0 0 5px black;
            z-index: 10;
        }

        #msg-status {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
            z-index: 10;
        }

        .torcida {
            position: absolute;
            top: 0;
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: space-around;
        }

        .torcedor {
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
        }

        .trave {
            width: 400px;
            height: 150px;
            border: 8px solid white;
            border-bottom: none;
            position: absolute;
            top: 60px;
            left: 200px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .goleiro {
            width: 50px;
            height: 50px;
            background: var(--neon-purple);
            position: absolute;
            top: 120px;
            left: 375px;
            transition: left 0.3s ease-out;
            border-radius: 5px;
        }

        .batedor {
            width: 40px;
            height: 60px;
            background: #8b0000;
            position: absolute;
            bottom: 10px;
            left: 380px;
            border-radius: 10px 10px 0 0;
        }

        .bola {
            width: 25px;
            height: 25px;
            background: radial-gradient(circle at 30% 30%, white, #aaa);
            border-radius: 50%;
            position: absolute;
            bottom: 80px;
            left: 387px;
            transition: all 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .interface {
            display: flex;
            width: 800px;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #222;
            color: white;
            border: 2px solid var(--neon-green);
            transition: 0.2s;
        }

        button:hover {
            background: var(--neon-green);
            color: black;
        }

        .chutar-btn {
            border-color: var(--neon-purple);
        }

        .chutar-btn:hover {
            background: var(--neon-purple);
            color: white;
        }
    </style>
</head>

<body>

    <div class="estadio">
        <div id="gol-efecto">
            <h1>GOOOOLLL!</h1>
        </div>
        <div id="placar">GOLS: 0</div>
        <div id="msg-status">Chute no gol!</div>
        <div class="torcida" id="torcida"></div>
        <div class="trave"></div>
        <div class="goleiro" id="goleiro"></div>
        <div class="batedor"></div>
        <div class="bola" id="bola"></div>
    </div>

    <div class="interface">
        <div class="joystick">
            <button onclick="mover(-40)">⬅</button>
            <button onclick="mover(40)">➡</button>
        </div>
        <button class="chutar-btn" onclick="chutar()">CHUTAR</button>
    </div>

    <script>
        let posBola = 387;
        let gols = 0;
        const bola = document.getElementById('bola');
        const goleiro = document.getElementById('goleiro');
        const statusMsg = document.getElementById('msg-status');
        const placar = document.getElementById('placar');
        const efeito = document.getElementById('gol-efecto');

        for (let i = 0; i < 40; i++) {
            let t = document.createElement('div');
            t.className = 'torcedor';
            document.getElementById('torcida').appendChild(t);
        }

        function mover(dir) {
            posBola = Math.max(210, Math.min(560, posBola + dir));
            bola.style.left = posBola + 'px';
        }

        function chutar() {
            statusMsg.innerText = "...";
            bola.style.bottom = '200px';
            bola.style.transform = 'rotate(360deg) scale(0.8)';

            setTimeout(() => {
                let gPos = parseInt(goleiro.style.left);
                if (Math.abs(posBola - gPos) < 60) {
                    statusMsg.innerText = "🧤 DEFESA!";
                    statusMsg.style.color = "#bc13fe";
                } else {
                    
                    efeito.style.display = 'flex';
                    setTimeout(() => efeito.style.display = 'none', 1500);

                    statusMsg.innerText = "⚽ GOOOOL!";
                    statusMsg.style.color = "#39ff14";
                    gols++;
                    placar.innerText = "GOLS: " + gols;
                }

                bola.style.bottom = '80px';
                bola.style.transform = 'rotate(0deg) scale(1)';

                setTimeout(() => statusMsg.innerText = "Chute no gol!", 2000);
            }, 600);
        }

        setInterval(() => {
            goleiro.style.left = (210 + Math.random() * 340) + 'px';
        }, 800);
    </script>
</body>

</html>
